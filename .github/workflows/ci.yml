name: CI

on:
  push:
    branches: [main, feat/**, fix/**]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck start.sh

      - name: Lint HTML
        run: |
          npm install -g htmlhint@1
          htmlhint --config .htmlhintrc public/index.html

      - name: Check JS deps install cleanly
        run: npm ci --omit=dev

      - name: Check server.js syntax
        run: node --check server.js

      - name: ESLint server.js
        run: |
          npm ci
          npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps (with devDependencies)
        run: npm ci

      - name: Run Jest tests
        run: npm test

  build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vhs-scanner:ci .
