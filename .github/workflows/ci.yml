name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate tapes.json
        run: python3 -c "import json, sys; json.load(open('data/tapes.json')); print('tapes.json is valid JSON')"
