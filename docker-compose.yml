services:

  web:
    build: .
    env_file: .env          # explicit dep — compose errors if .env is missing
    ports:
      - "${APP_PORT:-8082}:8080"
      - "${HTTPS_PORT:-8443}:8443"
    environment:
      - OLLAMA_UPSTREAM=${OLLAMA_UPSTREAM:-http://ollama:11434}
      - DATABASE_URL=${DATABASE_URL}
      - HOST_IP=${HOST_IP:-}
    volumes:
      - certs:/app/certs
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── GPU / native-Windows Ollama variant ────────────────────────────────
  # Run only this service when using native Windows Ollama (DirectML/CUDA):
  #   OLLAMA_UPSTREAM=http://host.docker.internal:11434 docker compose up web-gpu
  web-gpu:
    build: .
    profiles: [gpu]
    ports:
      - "${APP_PORT:-8082}:8080"
    environment:
      - OLLAMA_UPSTREAM=${OLLAMA_UPSTREAM:-http://host.docker.internal:11434}
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 8s
      timeout: 5s
      retries: 20
      start_period: 15s
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── HTTPS tunnel (mobile camera access) ───────────────────────────────────
  # Exposes the app at a random *.trycloudflare.com HTTPS URL.
  # URL is printed in logs: docker compose logs cloudflared | grep trycloudflare
  # For a stable URL, replace with a named Cloudflare Tunnel (needs CF account).
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://web:8080
    depends_on:
      - web
    restart: unless-stopped

  # One-shot: pulls the vision model on first run, skips if already cached.
  ollama-pull:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-llava:7b} && echo '✓ Model ready'"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

volumes:
  ollama_models:
  certs:
